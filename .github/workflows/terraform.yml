name: terraform

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
  push:
    branches:
      - master
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.5"
  AWS_REGION: "us-east-1"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

  plan-dev:
    name: Plan dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'

    concurrency:
      group: terraform-plan-dev
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for dev
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan (dev)
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -input=false \
            -no-color \
            -out=tfplan-dev | tee plan-dev.txt

      - name: Upload dev plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-dev
          path: |
            tfplan-dev
            plan-dev.txt

      - name: Add dev plan to PR summary
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Terraform plan: dev"
            echo ""
            echo '```'
            cat plan-dev.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  plan-prod:
    name: Plan prod
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'

    concurrency:
      group: terraform-plan-prod
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for prod
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan (prod)
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -input=false \
            -no-color \
            -out=tfplan-prod | tee plan-prod.txt

      - name: Upload prod plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-prod
          path: |
            tfplan-prod
            plan-prod.txt

      - name: Add prod plan to PR summary
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Terraform plan: prod"
            echo ""
            echo '```'
            cat plan-prod.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    needs:
      - validate
      - plan-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: development

    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for dev
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply (dev)
        run: |
          terraform apply \
            -var-file=environments/dev.tfvars \
            -input=false \
            -auto-approve

  #   ideally split into plan and apply
  apply-prod-manual:
    name: Apply prod (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    concurrency:
      group: terraform-apply-prod
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for prod
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -input=false \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false tfplan
